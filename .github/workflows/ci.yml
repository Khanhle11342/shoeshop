name: CI/CD Pipeline

on:
  push:
    tags:
      - '*'

env:
  IMAGE_NAME: shoeshop
  CONTAINER_NAME: shoeshop
  DOCKER_IMAGE: ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_PROJECT }}/shoeshop:${{ github.ref_name }}

jobs:
  build-and-push:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker (secure)
        run: |
          echo ${{ secrets.REGISTRY_PASSWORD }} | docker login ${{ secrets.REGISTRY_URL }} \
          -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Build Image
        run: docker build -t $DOCKER_IMAGE .

      - name: Push Image
        run: docker push $DOCKER_IMAGE

  deploy:
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Login Docker
        run: |
          echo ${{ secrets.REGISTRY_PASSWORD }} | docker login ${{ secrets.REGISTRY_URL }} \
          -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Pull Image
        run: docker pull $DOCKER_IMAGE

      - name: Stop old container (graceful)
        run: docker rm -f $CONTAINER_NAME || true

      - name: Run new container
        run: |
          docker run -d \
            -p 8080:8080 \
            --name $CONTAINER_NAME \
            --restart always \
            -v /datas/shoeshop/logs:/app/logs \
            $DOCKER_IMAGE

      - name: Wait for app
        run: sleep 10

      - name: Health check
        run: |
          curl -f http://localhost:8080 || (echo "App failed!" && exit 1)

  show-log:
    runs-on: self-hosted
    needs: deploy

    steps:
      - name: Wait
        run: sleep 5

      - name: Show logs
        run: docker logs --tail 200 $CONTAINER_NAME
