name: Build and Push to ECR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - run: mvn clean package -DskipTests

      - run: ls -lh target/

      - run: docker build -f Dockerfile -t shoeshop $GITHUB_WORKSPACE

      - run: |
          docker tag shoeshop:latest \
          390844782324.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/shoeshop:latest

      - run: |
          docker push \
          390844782324.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/shoeshop:latest
